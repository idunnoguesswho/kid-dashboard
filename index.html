
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Day Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #7EC8E3;
    --sun: #FFD166;
    --grass: #6BCB77;
    --coral: #FF6B6B;
    --lavender: #C9B8FF;
    --peach: #FFB347;
    --mint: #A8EDCA;
    --bg: #FFF8EE;
    --card: #FFFFFF;
    --text: #2D2A4A;
    --muted: #8A87A5;
    --border-radius: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--text);
  }

  /* Animated cloud background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 180px 80px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 70%),
      radial-gradient(ellipse 220px 90px at 70% 8%, rgba(255,255,255,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 150px 60px at 45% 20%, rgba(255,255,255,0.5) 0%, transparent 70%),
      linear-gradient(180deg, #c9ecff 0%, #ffe8c8 60%, #fff8ee 100%);
    z-index: -1;
    animation: skyShift 20s ease-in-out infinite alternate;
  }

  @keyframes skyShift {
    from { filter: hue-rotate(0deg) brightness(1); }
    to   { filter: hue-rotate(10deg) brightness(1.03); }
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 36px 16px;
  }

  .greeting {
    font-family: 'Baloo 2', cursive;
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }
  .greeting span { color: var(--coral); }

  .date-time-block {
    text-align: right;
  }
  #clock {
    font-family: 'Baloo 2', cursive;
    font-size: 3.4rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  #date-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    margin-top: 2px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    padding: 10px 36px 36px;
  }

  .card {
    background: var(--card);
    border-radius: var(--border-radius);
    padding: 26px 28px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.15s; }
  .card:nth-child(3) { animation-delay: 0.25s; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.15rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 1.3rem; }

  /* WEATHER CARD */
  .weather-card { grid-column: 1; }
  .weather-card .card-title { color: var(--sky); }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .weather-emoji { font-size: 4.2rem; animation: bob 3s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .weather-temp {
    font-family: 'Baloo 2', cursive;
    font-size: 3.6rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .weather-desc {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 700;
    margin-top: 2px;
  }

  .weather-extras {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .weather-pill {
    background: #F0F8FF;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #5A7D9A;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .weather-input-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .weather-input-row input {
    flex: 1;
    border: 2px solid #E8E4FF;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .weather-input-row input:focus { border-color: var(--sky); }
  .weather-input-row button {
    background: var(--sky);
    border: none;
    border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    color: white;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }
  .weather-input-row button:hover { transform: scale(1.05); background: #5db5d4; }

  /* CALENDAR CARD */
  .calendar-card { grid-column: 2; grid-row: 1 / 3; }
  .calendar-card .card-title { color: var(--coral); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 16px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 4px;
  }
  .cal-cell {
    text-align: center;
    border-radius: 10px;
    padding: 6px 2px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    color: var(--text);
    position: relative;
  }
  .cal-cell:hover { background: #FFF0F0; transform: scale(1.08); }
  .cal-cell.other-month { color: #CCC; }
  .cal-cell.today {
    background: var(--coral);
    color: white;
    box-shadow: 0 3px 10px rgba(255,107,107,0.4);
    transform: scale(1.12);
  }
  .cal-cell.has-event::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--sun);
  }
  .cal-cell.today.has-event::after { background: white; }

  .events-section { margin-top: 4px; }
  .events-header {
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 14px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .event-item:hover { transform: translateX(4px); }
  .event-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .event-text { flex: 1; }
  .event-name { font-size: 0.9rem; font-weight: 800; color: var(--text); }
  .event-time { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
  .event-delete {
    background: none;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 0;
    line-height: 1;
    color: var(--muted);
  }
  .event-item:hover .event-delete { opacity: 1; }

  .add-event-form {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: 10px;
    padding: 12px;
    background: #FFF5F5;
    border-radius: 14px;
  }
  .add-event-row { display: flex; gap: 7px; }
  .add-event-form input {
    flex: 1;
    border: 2px solid #FFD6D6;
    border-radius: 10px;
    padding: 7px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    background: white;
  }
  .add-event-form input:focus { border-color: var(--coral); }
  .add-event-form button {
    background: var(--coral);
    border: none;
    border-radius: 10px;
    padding: 7px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    color: white;
    cursor: pointer;
    transition: transform 0.15s;
    white-space: nowrap;
  }
  .add-event-form button:hover { transform: scale(1.04); }

  /* TODO CARD */
  .todo-card { grid-column: 1; grid-row: 2; }
  .todo-card .card-title { color: var(--grass); }

  .todo-list { list-style: none; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: 14px;
    margin-bottom: 5px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .todo-item:hover { background: #F4FFF6; }

  .todo-check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2.5px solid var(--grass);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
    background: white;
  }
  .todo-check.checked {
    background: var(--grass);
    border-color: var(--grass);
    transform: scale(1.1);
  }

  .todo-label {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    transition: opacity 0.2s;
  }
  .todo-label.done {
    text-decoration: line-through;
    opacity: 0.4;
  }

  .todo-delete {
    background: none;
    border: none;
    font-size: 0.9rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    color: var(--muted);
  }
  .todo-item:hover .todo-delete { opacity: 1; }

  .todo-add-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .todo-add-row input {
    flex: 1;
    border: 2px solid #D4F5DC;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    background: white;
  }
  .todo-add-row input:focus { border-color: var(--grass); }
  .todo-add-row button {
    background: var(--grass);
    border: none;
    border-radius: 12px;
    padding: 8px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    color: white;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .todo-add-row button:hover { transform: scale(1.05); }

  .progress-bar-wrap {
    background: #EDFBF0;
    border-radius: 50px;
    height: 10px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--grass), #4AC95A);
    transition: width 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .progress-label {
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--grass);
    margin-top: 5px;
    text-align: right;
  }

  /* color palette for events */
  .ec0 { background: #FFF0F0; } .ec0 .event-dot { background: #FF6B6B; }
  .ec1 { background: #FFF8E6; } .ec1 .event-dot { background: #FFD166; }
  .ec2 { background: #F0F8FF; } .ec2 .event-dot { background: #7EC8E3; }
  .ec3 { background: #F3EFFF; } .ec3 .event-dot { background: #C9B8FF; }
  .ec4 { background: #EDFBF0; } .ec4 .event-dot { background: #6BCB77; }

  /* Confetti burst */
  .confetti { position: fixed; pointer-events: none; z-index: 999; }
  .cf { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 1s ease-in forwards; }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="greeting">Good <span id="time-of-day">morning</span>! ☀️</div>
  <div class="date-time-block">
    <div id="clock">12:00</div>
    <div id="date-label">Loading...</div>
  </div>
</div>

<div class="grid">

  <!-- WEATHER CARD -->
  <div class="card weather-card">
    <div class="card-title"><span class="icon">🌤️</span> Today's Weather</div>
    <div class="weather-main">
      <div class="weather-emoji" id="w-emoji">🌤️</div>
      <div>
        <div class="weather-temp" id="w-temp">72°F</div>
        <div class="weather-desc" id="w-desc">Partly Cloudy</div>
      </div>
    </div>
    <div class="weather-extras">
      <div class="weather-pill">💧 <span id="w-humid">45%</span></div>
      <div class="weather-pill">💨 <span id="w-wind">8 mph</span></div>
      <div class="weather-pill">🌡️ <span id="w-feel">70°F</span></div>
    </div>
    <div class="weather-input-row">
      <input type="text" id="city-input" placeholder="Enter your city..." />
      <button onclick="fetchWeather()">Update</button>
    </div>
    <div id="w-error" style="font-size:0.8rem;color:var(--coral);margin-top:6px;font-weight:700;"></div>
  </div>

  <!-- CALENDAR CARD -->
  <div class="card calendar-card">
    <div class="card-title"><span class="icon">📅</span> Calendar</div>

    <div id="cal-month-label" style="font-size:1rem;font-weight:800;color:var(--muted);margin-bottom:8px;text-align:center;"></div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="events-section">
      <div class="events-header">Events this month</div>
      <div id="events-list"></div>
      <div class="add-event-form">
        <input type="text" id="ev-name" placeholder="Event name..." />
        <div class="add-event-row">
          <input type="date" id="ev-date" />
          <input type="time" id="ev-time" placeholder="Time (optional)" />
          <button onclick="addEvent()">+ Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TODO CARD -->
  <div class="card todo-card">
    <div class="card-title"><span class="icon">✅</span> My To-Dos</div>
    <ul class="todo-list" id="todo-list"></ul>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0 done</div>
    <div class="todo-add-row">
      <input type="text" id="todo-input" placeholder="Add something fun..." onkeydown="if(event.key==='Enter')addTodo()" />
      <button onclick="addTodo()">+ Add</button>
    </div>
  </div>

</div>

<script>
// ─── CLOCK ───────────────────────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  document.getElementById('clock').textContent = `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
  document.getElementById('date-label').textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
  const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  document.getElementById('time-of-day').textContent = tod;
}
updateClock();
setInterval(updateClock, 1000);

// ─── STORAGE HELPERS ─────────────────────────────────────────────────
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── WEATHER ─────────────────────────────────────────────────────────
const WX_CODES = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',77:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'
};
const WX_DESCS = {
  0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Foggy',
  51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',
  71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Showers',81:'Heavy Showers',
  82:'Violent Showers',85:'Snow Showers',86:'Heavy Snow Showers',95:'Thunderstorm',96:'Thunderstorm w/ Hail',99:'Thunderstorm w/ Hail'
};

async function fetchWeather() {
  const city = document.getElementById('city-input').value.trim();
  document.getElementById('w-error').textContent = '';
  if (!city) return;
  try {
    const geoR = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const geoD = await geoR.json();
    if (!geoD.results?.length) { document.getElementById('w-error').textContent = 'City not found 🤔'; return; }
    const {latitude: lat, longitude: lon} = geoD.results[0];
    const wxR = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph`);
    const wxD = await wxR.json();
    const c = wxD.current;
    const code = c.weather_code;
    document.getElementById('w-emoji').textContent = WX_CODES[code] ?? '🌤️';
    document.getElementById('w-temp').textContent = Math.round(c.temperature_2m) + '°F';
    document.getElementById('w-desc').textContent = WX_DESCS[code] ?? 'Unknown';
    document.getElementById('w-humid').textContent = c.relative_humidity_2m + '%';
    document.getElementById('w-wind').textContent = Math.round(c.wind_speed_10m) + ' mph';
    document.getElementById('w-feel').textContent = Math.round(c.apparent_temperature) + '°F';
    save('wx-city', city);
  } catch(e) {
    document.getElementById('w-error').textContent = 'Could not load weather 😕';
  }
}

// Load saved city on start
const savedCity = load('wx-city', '');
if (savedCity) {
  document.getElementById('city-input').value = savedCity;
  fetchWeather();
}

// ─── CALENDAR ────────────────────────────────────────────────────────
let events = load('kids-events', [
  { id: 1, name: 'Soccer Practice', date: todayStr(1), time: '3:30 PM' },
  { id: 2, name: "Dad's Birthday 🎂", date: todayStr(5), time: '' },
  { id: 3, name: 'Movie Night 🎬', date: todayStr(10), time: '7:00 PM' },
]);
let nextEvId = load('kids-evid', 10);

function todayStr(offset=0) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  document.getElementById('cal-month-label').textContent = `${MONTHS[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });

  const eventDates = new Set(events.map(e => e.date));
  const todayISO = now.toISOString().split('T')[0];

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell other-month';
    el.textContent = prevDays - firstDay + 1 + i;
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    el.className = 'cal-cell';
    if (dateStr === todayISO) el.classList.add('today');
    if (eventDates.has(dateStr)) el.classList.add('has-event');
    el.textContent = d;
    grid.appendChild(el);
  }

  renderEvents();
}

function renderEvents() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthEvents = events.filter(e => e.date.startsWith(prefix))
    .sort((a,b) => a.date.localeCompare(b.date));

  const list = document.getElementById('events-list');
  list.innerHTML = '';
  if (!monthEvents.length) {
    list.innerHTML = '<div style="font-size:0.85rem;color:var(--muted);padding:8px;font-weight:600;">No events this month yet!</div>';
    return;
  }
  monthEvents.forEach((ev, i) => {
    const cls = `ec${i % 5}`;
    const div = document.createElement('div');
    div.className = `event-item ${cls}`;
    const [y,m,d] = ev.date.split('-');
    const dateLabel = `${MONTHS[parseInt(m)-1]} ${parseInt(d)}`;
    div.innerHTML = `
      <div class="event-dot"></div>
      <div class="event-text">
        <div class="event-name">${ev.name}</div>
        <div class="event-time">${dateLabel}${ev.time ? ' · ' + ev.time : ''}</div>
      </div>
      <button class="event-delete" onclick="deleteEvent(${ev.id}, event)">✕</button>
    `;
    list.appendChild(div);
  });
}

function addEvent() {
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value;
  const timeVal = document.getElementById('ev-time').value;
  if (!name || !date) return;
  let timeStr = '';
  if (timeVal) {
    const [h, mm] = timeVal.split(':');
    const hh = parseInt(h);
    timeStr = `${hh % 12 || 12}:${mm} ${hh >= 12 ? 'PM' : 'AM'}`;
  }
  nextEvId++;
  events.push({ id: nextEvId, name, date, time: timeStr });
  save('kids-events', events);
  save('kids-evid', nextEvId);
  document.getElementById('ev-name').value = '';
  document.getElementById('ev-date').value = '';
  document.getElementById('ev-time').value = '';
  renderCalendar();
}

function deleteEvent(id, e) {
  e.stopPropagation();
  events = events.filter(ev => ev.id !== id);
  save('kids-events', events);
  renderCalendar();
}

renderCalendar();

// ─── TODOS ───────────────────────────────────────────────────────────
let todos = load('kids-todos', [
  { id: 1, text: 'Make my bed 🛏️', done: false },
  { id: 2, text: 'Brush teeth 🦷', done: false },
  { id: 3, text: 'Do homework 📚', done: false },
  { id: 4, text: 'Practice reading 📖', done: false },
]);
let nextTodoId = load('kids-todoid', 10);

function renderTodos() {
  const list = document.getElementById('todo-list');
  list.innerHTML = '';
  todos.forEach(t => {
    const li = document.createElement('li');
    li.className = 'todo-item';
    li.innerHTML = `
      <div class="todo-check ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})">
        ${t.done ? '✓' : ''}
      </div>
      <span class="todo-label ${t.done ? 'done' : ''}">${t.text}</span>
      <button class="todo-delete" onclick="deleteTodo(${t.id}, event)">✕</button>
    `;
    list.appendChild(li);
  });
  updateProgress();
}

function updateProgress() {
  const done = todos.filter(t => t.done).length;
  const total = todos.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total} done`;
  if (done > 0 && done === total) launchConfetti();
}

function toggleTodo(id) {
  todos = todos.map(t => t.id === id ? {...t, done: !t.done} : t);
  save('kids-todos', todos);
  renderTodos();
}

function addTodo() {
  const val = document.getElementById('todo-input').value.trim();
  if (!val) return;
  nextTodoId++;
  todos.push({ id: nextTodoId, text: val, done: false });
  save('kids-todos', todos);
  save('kids-todoid', nextTodoId);
  document.getElementById('todo-input').value = '';
  renderTodos();
}

function deleteTodo(id, e) {
  e.stopPropagation();
  todos = todos.filter(t => t.id !== id);
  save('kids-todos', todos);
  renderTodos();
}

renderTodos();

// ─── CONFETTI ────────────────────────────────────────────────────────
let confettiFired = false;
function launchConfetti() {
  if (confettiFired) return;
  confettiFired = true;
  setTimeout(() => confettiFired = false, 3000);
  const colors = ['#FF6B6B','#FFD166','#6BCB77','#7EC8E3','#C9B8FF','#FFB347'];
  const container = document.createElement('div');
  container.className = 'confetti';
  document.body.appendChild(container);
  for (let i = 0; i < 40; i++) {
    const cf = document.createElement('div');
    cf.className = 'cf';
    cf.style.cssText = `
      left:${Math.random()*100}vw;
      top:${Math.random()*60}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${0.7+Math.random()*0.6}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    container.appendChild(cf);
  }
  setTimeout(() => container.remove(), 2500);
}
</script>
